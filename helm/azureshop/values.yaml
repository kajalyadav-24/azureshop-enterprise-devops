replicaCount: 2

image:
  repository: acrazureshopkajal24.azurecr.io/azureshop-api
  tag: "v1.0.0"
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  port: 80
  targetPort: 8080

containerPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

readinessProbe:
  path: /actuator/health
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

livenessProbe:
  path: /actuator/health
  initialDelaySeconds: 40
  periodSeconds: 15
  timeoutSeconds: 3
  failureThreshold: 3

namespace:
  create: false
  name: azureshop